name: Release binaries

# Builds release tarballs for Linux (x86_64) and FreeBSD (14.2, 15.0 — amd64)
# when a semver tag is pushed, or on manual workflow_dispatch.
#
# Two variants per platform:
#   budyk-<version>-<platform>.tar.gz          Release, stripped (distribution).
#   budyk-<version>-<platform>-debug.tar.gz    RelWithDebInfo, unstripped —
#                                              same code-gen, full DWARF for gdb(1)
#                                              / lldb(1) post-mortem / crash-dump
#                                              analysis.
#
# Each tarball contains budyk + LICENSE + README.md + CHANGELOG.md +
# docs/budyk.8 and is accompanied by a .sha256 sidecar.
#
# When the trigger is a tag, all tarballs and their SHA256 sums are attached
# to the GitHub Release named after the tag.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (branch, tag, sha)'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # needed by softprops/action-gh-release

jobs:
  # ----------------------------------------------------------------------
  # 1. Compute version string used in tarball names.
  # ----------------------------------------------------------------------
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      is_tag:  ${{ steps.v.outputs.is_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - id: v
        run: |
          set -ex
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VER="${GITHUB_REF_NAME#v}"
            echo "is_tag=true" >> "$GITHUB_OUTPUT"
          else
            VER=$(sed -nE 's/.*project\(budyk VERSION ([0-9.]+).*/\1/p' CMakeLists.txt | head -1)
            VER="${VER}-${GITHUB_SHA::8}"
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VER}"

  # ----------------------------------------------------------------------
  # 2. Linux x86_64 build — Release + RelWithDebInfo.
  # ----------------------------------------------------------------------
  linux:
    needs: meta
    runs-on: ubuntu-latest
    timeout-minutes: 25
    name: Linux amd64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Install toolchain and dependencies
        run: |
          set -ex
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake g++ pkg-config \
            liblua5.4-dev libyaml-dev libargon2-dev libncurses-dev

      - name: Build Release (stripped)
        run: |
          set -ex
          cmake -B build-release \
            -DBUDYK_PLATFORM=linux \
            -DSTATIC_LINK=OFF \
            -DBUILD_TESTS=OFF \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build-release -j"$(nproc)"
          strip build-release/src/budyk || true
          file build-release/src/budyk

      - name: Build RelWithDebInfo (debug symbols kept)
        run: |
          set -ex
          cmake -B build-debug \
            -DBUDYK_PLATFORM=linux \
            -DSTATIC_LINK=OFF \
            -DBUILD_TESTS=OFF \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo
          cmake --build build-debug -j"$(nproc)"
          # Do NOT strip — the debug tarball is for post-mortem / gdb.
          file build-debug/src/budyk

      - name: Stage tarballs
        env:
          VER: ${{ needs.meta.outputs.version }}
        run: |
          set -ex
          for variant in release debug; do
            if [ "$variant" = "release" ]; then
              SRC=build-release/src/budyk
              STAGE="budyk-${VER}-linux-amd64"
            else
              SRC=build-debug/src/budyk
              STAGE="budyk-${VER}-linux-amd64-debug"
            fi
            mkdir -p "$STAGE"
            cp "$SRC" "$STAGE/"
            cp LICENSE "$STAGE/"
            [ -f README.md    ] && cp README.md    "$STAGE/" || true
            [ -f CHANGELOG.md ] && cp CHANGELOG.md "$STAGE/" || true
            mkdir -p "$STAGE/docs"
            [ -f docs/budyk.8 ] && cp docs/budyk.8 "$STAGE/docs/" || true
            tar -czf "${STAGE}.tar.gz" "$STAGE"
            sha256sum "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"
          done
          ls -la budyk-*.tar.gz*

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: budyk-linux-amd64
          path: |
            budyk-*-linux-amd64.tar.gz
            budyk-*-linux-amd64.tar.gz.sha256
            budyk-*-linux-amd64-debug.tar.gz
            budyk-*-linux-amd64-debug.tar.gz.sha256
          if-no-files-found: error
          retention-days: 14

  # ----------------------------------------------------------------------
  # 3. FreeBSD amd64 matrix (14.2 / 15.0) — Release + RelWithDebInfo.
  #    Both variants built inside the same VM run to avoid paying the
  #    cross-platform-actions boot cost twice.
  # ----------------------------------------------------------------------
  freebsd:
    needs: meta
    runs-on: ubuntu-latest
    timeout-minutes: 70
    strategy:
      fail-fast: false
      matrix:
        freebsd-version: ['14.2', '15.0']
    name: FreeBSD ${{ matrix.freebsd-version }} amd64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Build on FreeBSD
        uses: cross-platform-actions/action@v0.32.0
        timeout-minutes: 65
        env:
          VER: ${{ needs.meta.outputs.version }}
          FBSD: ${{ matrix.freebsd-version }}
        with:
          operating_system: freebsd
          version: ${{ matrix.freebsd-version }}
          environment_variables: VER FBSD
          shell: sh
          memory: 6G
          cpu_count: 3
          run: |
            set -ex

            echo "::group::Install dependencies"
            sudo pkg install -y cmake pkgconf lua54 libyaml libargon2
            echo "::endgroup::"

            NCPU=$(sysctl -n hw.ncpu)
            JOBS=$(( NCPU < 3 ? NCPU : 2 ))

            echo "::group::Build Release (stripped)"
            cmake -B build-release \
              -DBUDYK_PLATFORM=freebsd \
              -DSTATIC_LINK=OFF \
              -DBUILD_TESTS=OFF \
              -DCMAKE_BUILD_TYPE=Release
            cmake --build build-release -j"$JOBS"
            strip build-release/src/budyk || true
            file build-release/src/budyk
            echo "::endgroup::"

            echo "::group::Build RelWithDebInfo (debug symbols kept)"
            cmake -B build-debug \
              -DBUDYK_PLATFORM=freebsd \
              -DSTATIC_LINK=OFF \
              -DBUILD_TESTS=OFF \
              -DCMAKE_BUILD_TYPE=RelWithDebInfo
            cmake --build build-debug -j"$JOBS"
            # Do NOT strip.
            file build-debug/src/budyk
            echo "::endgroup::"

            echo "::group::Stage tarballs"
            for variant in release debug; do
              if [ "$variant" = "release" ]; then
                SRC=build-release/src/budyk
                STAGE="budyk-${VER}-freebsd${FBSD}-amd64"
              else
                SRC=build-debug/src/budyk
                STAGE="budyk-${VER}-freebsd${FBSD}-amd64-debug"
              fi
              mkdir -p "$STAGE"
              cp "$SRC" "$STAGE/"
              cp LICENSE "$STAGE/"
              [ -f README.md    ] && cp README.md    "$STAGE/" || true
              [ -f CHANGELOG.md ] && cp CHANGELOG.md "$STAGE/" || true
              mkdir -p "$STAGE/docs"
              [ -f docs/budyk.8 ] && cp docs/budyk.8 "$STAGE/docs/" || true
              tar -czf "${STAGE}.tar.gz" "$STAGE"
              sha256 -r "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"
            done
            ls -la budyk-*.tar.gz*
            echo "::endgroup::"

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: budyk-freebsd-${{ matrix.freebsd-version }}-amd64
          path: |
            budyk-*-freebsd${{ matrix.freebsd-version }}-amd64.tar.gz
            budyk-*-freebsd${{ matrix.freebsd-version }}-amd64.tar.gz.sha256
            budyk-*-freebsd${{ matrix.freebsd-version }}-amd64-debug.tar.gz
            budyk-*-freebsd${{ matrix.freebsd-version }}-amd64-debug.tar.gz.sha256
          if-no-files-found: error
          retention-days: 14

  # ----------------------------------------------------------------------
  # 4. Publish to GitHub Release when triggered by a tag push.
  # ----------------------------------------------------------------------
  publish:
    needs: [meta, linux, freebsd]
    if: needs.meta.outputs.is_tag == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: budyk-*
          merge-multiple: true

      - name: Show collected assets
        run: |
          set -ex
          ls -la dist/
          cat dist/*.sha256 || true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: budyk ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body_path: ${{ github.workspace }}/CHANGELOG.md
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          fail_on_unmatched_files: true
